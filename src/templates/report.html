<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>{{TITLE}}</title>
<style>
  :root {
    --surface-1: #fcfcfb;
    --page: #f9f9f7;
    --text-primary: #0b0b0b;
    --text-secondary: #52514e;
    --muted: #898781;
    --grid: #e1e0d9;
    --baseline: #c3c2b7;
    --border: rgba(11, 11, 11, 0.10);
    --opportunity: #2a78d6;
    --risk: #e34948;
    --neutral: #898781;
    --internal: #2a78d6;
    --external: #1baf7a;
    --good: #0ca30c;
    --warning: #fab219;
    --serious: #ec835a;
    --critical: #d03b3b;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --surface-1: #1a1a19;
      --page: #0d0d0d;
      --text-primary: #ffffff;
      --text-secondary: #c3c2b7;
      --muted: #898781;
      --grid: #2c2c2a;
      --baseline: #383835;
      --border: rgba(255, 255, 255, 0.10);
      --opportunity: #3987e5;
      --risk: #e66767;
      --internal: #3987e5;
      --external: #199e70;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--page);
    color: var(--text-primary);
    font-family: system-ui, -apple-system, "Segoe UI", "Malgun Gothic", sans-serif;
    line-height: 1.5;
  }
  main { max-width: 1080px; margin: 0 auto; padding: 24px 20px 64px; }
  header.report-head { padding-bottom: 8px; border-bottom: 1px solid var(--border); margin-bottom: 8px; }
  header.report-head h1 { font-size: 22px; margin: 0 0 4px; }
  .subtle { color: var(--text-secondary); font-size: 13px; }
  section { background: var(--surface-1); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-top: 20px; }
  section > h2 { font-size: 16px; margin: 0 0 14px; }
  .backtest-banner { background: rgba(42, 120, 214, 0.12); border: 1px solid var(--opportunity); border-radius: 10px; padding: 10px 14px; margin-top: 14px; font-size: 13px; }
  .kpis { display: flex; flex-wrap: wrap; gap: 12px; margin: 4px 0 16px; }
  .kpi { flex: 1 1 130px; border: 1px solid var(--border); border-radius: 10px; padding: 12px; }
  .kpi .num { font-size: 26px; font-weight: 650; font-variant-numeric: tabular-nums; }
  .kpi .lbl { color: var(--text-secondary); font-size: 12px; }
  ol.priority { margin: 0; padding-left: 20px; }
  ol.priority li { margin-bottom: 6px; }
  .lede { margin: 0 0 12px; }
  .lede li { margin-bottom: 4px; }
  .badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 1px 7px; border-radius: 999px; border: 1px solid var(--border); vertical-align: middle; }
  .badge.planned { color: var(--serious); border-color: var(--serious); }
  .badge.opportunity { color: var(--opportunity); border-color: var(--opportunity); }
  .badge.risk { color: var(--risk); border-color: var(--risk); }
  .badge.neutral { color: var(--neutral); }
  .badge.tier { color: var(--text-secondary); }
  .badge.conf-high { color: var(--good); border-color: var(--good); }
  .badge.conf-medium { color: var(--warning); border-color: var(--warning); }
  .badge.conf-low { color: var(--muted); }
  .viz { margin-bottom: 26px; }
  .viz h3 { font-size: 13px; color: var(--text-secondary); margin: 0 0 8px; font-weight: 600; }
  .viz svg { max-width: 100%; height: auto; display: block; }
  .chart-scroll { overflow-x: auto; }
  .legend { display: flex; gap: 16px; flex-wrap: wrap; font-size: 12px; color: var(--text-secondary); margin-top: 8px; }
  .legend .swatch { display: inline-block; width: 11px; height: 11px; border-radius: 3px; margin-right: 5px; vertical-align: middle; }
  .card { border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-top: 12px; }
  .card h3 { margin: 0 0 6px; font-size: 15px; }
  .card .meta { color: var(--text-secondary); font-size: 12px; margin-bottom: 8px; }
  .reaction { border-top: 1px dashed var(--border); padding-top: 10px; margin-top: 10px; }
  .reaction.low-conf { opacity: 0.55; filter: saturate(0.6); }
  .deltas { font-variant-numeric: tabular-nums; font-size: 13px; color: var(--text-secondary); }
  .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 640px) { .cols { grid-template-columns: 1fr; } }
  ul.tight { margin: 6px 0; padding-left: 18px; }
  ul.tight li { margin-bottom: 3px; }
  details { margin-top: 8px; }
  summary { cursor: pointer; color: var(--text-secondary); font-size: 12px; }
  a { color: var(--opportunity); }
  .evref { font-size: 11px; color: var(--muted); }
  .changes-empty, .limitations li { color: var(--text-secondary); font-size: 13px; }
  table.diff { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.diff th, table.diff td { text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--border); }
  .actual-col { border-left: 2px solid var(--baseline); padding-left: 12px; }
  .actual-col em { color: var(--muted); }
</style>
</head>
<body>
<main>
  <header class="report-head">
    <h1>{{TITLE}}</h1>
    <div class="subtle">run: {{RUN_ID}} · 생성 {{GENERATED_AT}}</div>
    {{BACKTEST_BANNER}}
  </header>

  <section id="summary" aria-label="요약">
    <h2>요약</h2>
    {{SUMMARY}}
  </section>

  <section id="visualizations" aria-label="시각화">
    <h2>시각화</h2>
    {{VIZ}}
  </section>

  <section id="details" aria-label="상세">
    <h2>상세</h2>
    {{DETAILS}}
  </section>

  <section id="changes" aria-label="변화 추적">
    <h2>변화 추적</h2>
    {{CHANGES}}
  </section>

  <section id="limitations" aria-label="한계 고지">
    <h2>한계 고지</h2>
    {{LIMITATIONS}}
  </section>
</main>
</body>
</html>
